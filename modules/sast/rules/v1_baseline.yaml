  - id: sast.python.sql_injection.string_execute
    analysis: taint
    title: SQL injection (string passed to execute)
    message: >
      Untrusted data may reach a single-argument cursor.execute() call. Parameterized execute (second argument tuple/list)
      is treated as a modeled safe pattern for V1 only at this sink shape.
    severity: high
    confidence: medium
    category: sql_injection
    language: python
    cwe: "89"
    references:
      - https://cwe.mitre.org/data/definitions/89.html
    tags:
      - python
      - taint
      - sql
    sources:
      - { type: call_name, name: input }
      - { type: attribute, base: sys, attr: argv }
      - { type: sys_argv_subscript }
      - { type: qualified_call, qname: os.getenv }
    sinks:
