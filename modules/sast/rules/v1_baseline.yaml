schema_version: "1"
rules:
  - id: sast.python.command_injection.subprocess_shell
    analysis: taint
    title: Command injection risk (subprocess with shell=True)
    message: >
      Untrusted data may reach a shell through subprocess APIs when shell=True.
      V1 models only explicit sources and intrafile calls; inter-file and framework request objects are not automatic sources.
    severity: high
    confidence: medium
    category: command_injection
    language: python
    cwe: "78"
    references:
      - https://cwe.mitre.org/data/definitions/78.html
    tags:
      - python
      - taint
      - command_injection
    sources:
      - { type: call_name, name: input }
      - { type: attribute, base: sys, attr: argv }
      - { type: sys_argv_subscript }
      - { type: qualified_call, qname: os.getenv }
    sinks:
      - { type: subprocess_shell }
    sanitizers:
      - { type: qualified_call, qname: shlex.quote }
    propagators:
      - { type: call_name, names: [str, repr] }

