  - id: sast.python.crypto.weak_hash_md5_sha1
    analysis: sink_only
    title: Weak hash primitive (MD5 or SHA-1)
    message: >
      hashlib.md5 / hashlib.sha1 is flagged for security-sensitive contexts. This is a static pattern match;
      V1 does not classify benign uses (e.g., non-crypto checksums).
    severity: medium
    confidence: high
    category: weak_cryptography
    language: python
    cwe: "327"
    references:
      - https://cwe.mitre.org/data/definitions/327.html
    tags:
      - python
      - crypto
      - pattern
    sources: []
    sinks:
      - { type: weak_hash_md5_sha1 }
